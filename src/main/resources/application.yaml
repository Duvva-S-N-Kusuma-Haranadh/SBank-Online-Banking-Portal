spring:
  application:
    name:
       SBank

  datasource:
    url: ${DB_URL}
    username: ${DB_UNAME}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    
    properties:
      hibernate:
        query:
          startup_check: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
